services:
  redis:
    image: redis:7-alpine
    container_name: meta-face-redis
    ports:
      - "26379:6379"
    volumes:
      - meta_face_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rq-dashboard:
    build: docker/rq-dashboard
    container_name: meta-face-rq-dashboard
    ports:
      - "29181:9181"
    environment:
      RQ_DASHBOARD_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  meta_face_redis_data:
